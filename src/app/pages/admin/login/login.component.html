<div class="login-page">
  <div class="form">
    <form class="login-form">
      <input type="text" placeholder="username" [(ngModel)] = "user.name" name="name"/>
      <input type="password" placeholder="password" [(ngModel)] = "user.password" name="password"/>
      <button type="button" (click)="onClick()">login</button>
    </form>
  </div>
</div>
