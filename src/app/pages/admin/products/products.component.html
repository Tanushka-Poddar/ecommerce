<div class="row">
  <div [ngClass]="newPanelVisible ? 'col-8' : 'col-12'">
    <!-- left panel showing all products -->
    <div class="card">
      <div class="card-header bg-secondary">
        <div class="row">
          <div class="col-6 text-white">Product List</div>
          <div class="col-6 text-end">
            <button class="btn btn-sm btn-success" (click)="onClickNew()">
              new
            </button>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-3">
            <div class="card">
              <img
                class="card-img-top"
                src="img_avatar1.png"
                alt="Card image"
              />
              <div class="card-body">
                <h4 class="card-title">John Doe</h4>
                <p class="card-text">Some example text.</p>
                <a href="#" class="btn btn-primary">See Profile</a>
              </div>
            </div>
          </div>
          <div class="col-3">
            <div class="card">
              <img
                class="card-img-top"
                src="img_avatar1.png"
                alt="Card image"
              />
              <div class="card-body">
                <h4 class="card-title">John Doe</h4>
                <p class="card-text">Some example text.</p>
                <a href="#" class="btn btn-primary">See Profile</a>
              </div>
            </div>
          </div>
          <div class="col-3">
            <div class="card">
              <img
                class="card-img-top"
                src="img_avatar1.png"
                alt="Card image"
              />
              <div class="card-body">
                <h4 class="card-title">John Doe</h4>
                <p class="card-text">Some example text.</p>
                <a href="#" class="btn btn-primary">See Profile</a>
              </div>
            </div>
          </div>
          <div class="col-3">
            <div class="card">
              <img
                class="card-img-top"
                src="img_avatar1.png"
                alt="Card image"
              />
              <div class="card-body">
                <h4 class="card-title">John Doe</h4>
                <p class="card-text">Some example text.</p>
                <a href="#" class="btn btn-primary">See Profile</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-4" *ngIf="newPanelVisible">
    <!-- right panel showing new product form -->
    <div class="card">
      <div class="card-header bg-secondary">
        <div class="row">
          <div class="col-6 text-white">New Product</div>
          <div class="col-6 text-end">
            <button class="btn btn-sm btn-success" (click)="onClickClose()">
              close
            </button>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-6">
            <label for="">Product ID</label>
            <input type="text" [(ngModel)]="productObj.productId" class="form-control">
          </div>
          <div class="col-6"> 
            <label for="">SKU</label>
            <input type="text" [(ngModel)]="productObj.productSku" class="form-control">
          </div>
          <div class="col-6"> 
            <label for="">Name</label>
            <input type="text" [(ngModel)]="productObj.productName" class="form-control">
          </div>
          <div class="col-6">
            <label for="">Price</label>
            <input type="text" [(ngModel)]="productObj.productPrice" class="form-control">
          </div>
          <div class="col-6">
            <label for="">Short Name</label>
            <input type="text" [(ngModel)]="productObj.productShortName" class="form-control">
          </div>
          <div class="col-6">
            <label for="">Description</label>
            <input type="text" [(ngModel)]="productObj.productDescription" class="form-control">
          </div>
          <div class="col-6"> 
            <label for="">Date</label>
            <input type="text" [(ngModel)]="productObj.productDate" class="form-control">
          </div>
          <div class="col-6"> 
            <label for="">Delivery Timespan</label>
            <input type="text" [(ngModel)]="productObj.productDeliveryTimespan" class="form-control">
          </div>
          <div class="col-6"> 
            <label for="">Category ID</label>
            <input type="text" [(ngModel)]="productObj.productCategoryId" class="form-control">
          </div>
          <div class="col-6"> 
            <label for="">Product Image</label>
            <input type="text" [(ngModel)]="productObj.productImage" class="form-control">
          </div>
          <div class="col-6">
            <label for="">User ID</label>
            <input type="text" [(ngModel)]="productObj.userId" class="form-control">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
